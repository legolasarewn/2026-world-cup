<style>
:root {
  --navy: #0a1628;
  --navy2: #0f1f3d;
  --gold: #c9a227;
  --gold2: #e8c04a;
  --red: #c0392b;
  --green: #27ae60;
  --gray: #7a8fa8;
  --card: #0e1929;
  --border: #1a2d4a;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--navy); color:#dde5f0; font-family:'Noto Sans TC',sans-serif; min-height:100vh; }

/* HEADER */
.header {
  background: linear-gradient(170deg, #071020 0%, #0d1e3a 50%, #0a1628 100%);
  padding: 24px 16px 16px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 2px 8px;
  border-radius: 2px;
  margin-bottom: 8px;
  opacity: 0.85;
}
.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 4px;
  color: #fff;
  line-height: 1;
}
.title span { color: var(--gold); }
.subtitle { font-size: 11px; color: var(--gray); margin-top: 5px; letter-spacing: 0.5px; }
.hosts { font-size: 20px; margin-top: 10px; display: flex; justify-content: center; gap: 10px; align-items: center; }
.hosts span { font-size: 11px; color: var(--border); }

/* LIVE BAR */
.livebar {
  background: var(--navy2);
  padding: 8px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.api-dot { font-size: 10px; color: var(--gray); transition: color .3s; }
.api-dot.ok { color: var(--green); }
.api-dot.err { color: var(--gold); }
.clock { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--gold); letter-spacing: 2px; }

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat {
  background: var(--navy2);
  padding: 10px 4px;
  text-align: center;
}
.stat-n { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--gold); line-height:1; }
.stat-l { font-size:9px; color:var(--gray); margin-top:2px; letter-spacing:0.5px; }

/* FILTERS */
.filters {
  display: flex;
  gap: 6px;
  padding: 10px 14px;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--navy);
  border-bottom: 1px solid var(--border);
}
.filters::-webkit-scrollbar { display: none; }
.fbtn {
  flex-shrink: 0;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--gray);
  padding: 5px 13px;
  border-radius: 20px;
  font-size: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.fbtn.on { background: var(--gold); color: var(--navy); border-color: var(--gold); font-weight: 700; }

/* SEARCH */
.search { padding: 10px 14px; background: var(--navy); border-bottom: 1px solid var(--border); }
.search input {
  width: 100%;
  background: var(--navy2);
  border: 1px solid var(--border);
  color: #dde5f0;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
}
.search input:focus { border-color: var(--gold); }
.search input::placeholder { color: var(--gray); }

/* DAY */
.day { padding: 0 14px; }
.day-hdr {
  display: flex;
  align-items: baseline;
  gap: 6px;
  padding: 14px 0 6px;
  position: sticky;
  top: 0;
  background: var(--navy);
  z-index: 5;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.day-date { font-size: 15px; font-weight: 700; color: #fff; }
.day-wd { font-size: 11px; color: var(--gray); }
.day-cnt { margin-left: auto; font-size: 10px; color: var(--gray); background: var(--navy2); padding: 2px 7px; border-radius: 10px; }

/* MATCH CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 13px;
  margin-bottom: 7px;
  position: relative;
}
.card.live { border-color: var(--red); }
.card.done { opacity: .6; }
.card.r32,.card.r16 { border-left: 3px solid #6366f1; }
.card.qf { border-left: 3px solid #0891b2; }
.card.sf { border-left: 3px solid var(--red); }
.card.final { border-left: 3px solid var(--gold); background: linear-gradient(135deg,var(--card),#150f00); }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 9px;
}
.grp-label { font-size: 10px; color: var(--gold); font-weight: 700; letter-spacing: 1px; }
.stage-tag { font-size: 10px; color: var(--gray); background: var(--navy2); padding: 1px 6px; border-radius: 3px; }
.live-badge {
  font-size: 9px; font-weight: 700; color: #fff; background: var(--red);
  padding: 2px 6px; border-radius: 3px; letter-spacing: 1px;
  animation: blink 1.4s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.countdown-badge { font-size: 10px; color: var(--gold); font-weight: 600; }

.teams {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}
.team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.flag { font-size: 28px; line-height: 1; }
.tname { font-size: 11px; font-weight: 700; color: #fff; text-align: center; line-height: 1.2; }
.scorebox { min-width: 60px; text-align: center; }
.score { font-family:'Bebas Neue',sans-serif; font-size:30px; line-height:1; color:var(--gold2); letter-spacing:2px; }
.vs { font-size: 13px; color: var(--gray); }
.live-score { font-size: 13px; color: var(--red); font-weight: 700; }

.card-bot { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--gray); }
.match-time { font-weight: 700; color: #9ab0cc; font-size: 13px; }
.match-time.live { color: var(--red); }

/* EMPTY */
.empty { text-align: center; padding: 60px 20px; color: var(--gray); }
.empty .ico { font-size: 40px; margin-bottom: 12px; }

/* FOOTER */
.footer { text-align:center; padding:24px 16px; font-size:10px; color:var(--gray); border-top:1px solid var(--border); margin-top:20px; }
.footer a { color:var(--gold); text-decoration:none; }
</style>

  ['2026-07-10 03:00','16強勝者','16強勝者','溫哥華','','qf'],
  ['2026-07-10 07:00','16強勝者','16強勝者','休士頓','','qf'],
  ['2026-07-11 04:00','16強勝者','16強勝者','紐約/新澤西','','qf'],
  ['2026-07-11 08:00','16強勝者','16強勝者','洛杉磯','','qf'],

  ['2026-07-15 03:00','八強勝者','八強勝者','達拉斯','','sf'],

// Parse TW time string → UTC Date
function parseTW(s) {
  const [d, t] = s.split(' ');
  const [y,mo,day] = d.split('-').map(Number);
  const [h,mi] = t.split(':').map(Number);
  return new Date(Date.UTC(y, mo-1, day, h-8, mi));
}

const MATCHES = RAW.map(r => ({
  tw: r[0], home: r[1], away: r[2], venue: r[3],
  group: r[4], stage: r[5],
  scoreHome: r[6], scoreAway: r[7],
  dateObj: parseTW(r[0])
}));

// ── LIVE DATA ────────────────────────────────────────
let liveData = {};
let apiOk = false;
let lastFetch = 0;

// openfootball name → our name
const OFB = {
  'Mexico':'Mexico','South Africa':'South Africa','South Korea':'Korea Republic',
  'Czech Republic':'Czechia','Canada':'Canada',
  'Bosnia & Herzegovina':'Bosnia & Herzegovina','Qatar':'Qatar','Switzerland':'Switzerland',
  'Brazil':'Brazil','Morocco':'Morocco','Haiti':'Haiti','Scotland':'Scotland',
  'USA':'USA','Paraguay':'Paraguay','Australia':'Australia','Turkey':'Türkiye',
  'Germany':'Germany','Curacao':'Curaçao','Ivory Coast':'Ivory Coast','Ecuador':'Ecuador',
  'Netherlands':'Netherlands','Japan':'Japan','Sweden':'Sweden','Tunisia':'Tunisia',
  'Spain':'Spain','Cape Verde':'Cape Verde','Saudi Arabia':'Saudi Arabia','Uruguay':'Uruguay',
  'Belgium':'Belgium','Egypt':'Egypt','Iran':'Iran','New Zealand':'New Zealand',
  'France':'France','Senegal':'Senegal','Iraq':'Iraq','Norway':'Norway',
  'Argentina':'Argentina','Algeria':'Algeria','Austria':'Austria','Jordan':'Jordan',
  'Portugal':'Portugal','DR Congo':'DR Congo','Uzbekistan':'Uzbekistan','Colombia':'Colombia',
  'England':'England','Croatia':'Croatia','Ghana':'Ghana','Panama':'Panama',
};

async function fetchESPN() {
  if (Date.now() - lastFetch < 55000) return;
  lastFetch = Date.now();
  try {
    const url = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const now = new Date();

    (data.matches || []).forEach(m => {
      const ft = m.score?.ft;
      if (!ft || ft.length < 2) return;
      const home = OFB[m.team1] || m.team1;
      const away = OFB[m.team2] || m.team2;
      // Parse match date
      const matchDate = new Date(m.date + 'T00:00:00Z');
      const st = matchDate < now ? 'done' : 'pre';
      liveData[home+'|'+away] = { sh: ft[0], sa: ft[1], st };
    });
    apiOk = true;
  } catch(e) {
    apiOk = false;
  }
  updateApiDot();
  render();
}
const espnTeams = {};

function getLive(home, away) { return liveData[home+'|'+away] || null; }

function updateApiDot() {
  const el = document.getElementById('apiDot');
  if (!el) return;
  if (apiOk) { el.textContent = '● 即時比分同步中'; el.className = 'api-dot ok'; }
  else { el.textContent = '● 靜態資料模式'; el.className = 'api-dot err'; }
}

// ── TIME UTILS ───────────────────────────────────────
function twStr(date) {
  const tw = new Date(date.getTime() + 8*3600000);
  return String(tw.getUTCHours()).padStart(2,'0')+':'+String(tw.getUTCMinutes()).padStart(2,'0');
}
function twDayKey(date) {
  const tw = new Date(date.getTime() + 8*3600000);
  return `${tw.getUTCFullYear()}-${String(tw.getUTCMonth()+1).padStart(2,'0')}-${String(tw.getUTCDate()).padStart(2,'0')}`;
}
function twDayLabel(date) {
  const tw = new Date(date.getTime() + 8*3600000);
  const wd = ['日','一','二','三','四','五','六'][tw.getUTCDay()];
  return `${tw.getUTCMonth()+1}月${tw.getUTCDate()}日（週${wd}）`;
}
function nowDayKey() { return twDayKey(new Date()); }
function status(m) {
  const now = Date.now(), s = m.dateObj.getTime();
  if (now < s) return 'pre';
  if (now < s + 115*60000) return 'live';
  return 'done';
}
function countdown(ms) {
  const h = Math.floor(ms/3600000), mi = Math.floor((ms%3600000)/60000);
  if (h > 48) return Math.floor(h/24)+'天後';
  if (h > 0) return h+'h'+mi+'m 後開賽';
  return mi+'分鐘後開賽';
}

// ── STATE ────────────────────────────────────────────
let filterStage = 'all';
let searchQ = '';

function filtered() {
  return MATCHES.filter(m => {
    if (filterStage !== 'all' && m.stage !== filterStage) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      if (!m.home.toLowerCase().includes(q) && !m.away.toLowerCase().includes(q) && !m.venue.includes(q)) return false;
    }
    return true;
  });
}

// ── RENDER ───────────────────────────────────────────
function render() {
  const list = filtered();
  const byDay = {};
  list.forEach(m => {
    const k = twDayKey(m.dateObj);
    (byDay[k] = byDay[k]||[]).push(m);
  });
  const days = Object.keys(byDay).sort();
  const el = document.getElementById('list');
  if (!days.length) {
    el.innerHTML = '<div class="empty"><div class="ico">🔍</div>找不到相關比賽</div>';
    return;
  }
  const today = nowDayKey();
  el.innerHTML = days.map(dk => {
    const ms = byDay[dk];
    const isToday = dk === today;
    const label = twDayLabel(ms[0].dateObj);
    const cards = ms.map(m => matchCard(m)).join('');
    return `<div class="day">
      <div class="day-hdr">
        <span class="day-date">${label} ${isToday ? '🔴' : ''}</span>
        <span class="day-cnt">${ms.length} 場</span>
      </div>${cards}</div>`;
  }).join('');
}

function matchCard(m) {
  const now = Date.now();
  const st = status(m);
  const live = getLive(m.home, m.away);
  const apiSt = live?.st || st;

  // Score display
  const hasScore = live ? true : m.scoreHome !== undefined;
  const sh = live ? live.sh : m.scoreHome;
  const sa = live ? live.sa : m.scoreAway;

  let scoreHTML;
  if (hasScore) scoreHTML = `<div class="score">${sh}:${sa}</div>`;
  else if (apiSt === 'live' || st === 'live') scoreHTML = `<div class="live-score">直播中</div>`;
  else scoreHTML = `<div class="vs">VS</div>`;

  const isLive = apiSt === 'live' || st === 'live';
  const msUntil = m.dateObj.getTime() - now;
  let badge = '';
  if (isLive) badge = `<span class="live-badge">● LIVE</span>`;
  else if (st === 'pre' && msUntil < 86400000) badge = `<span class="countdown-badge">${countdown(msUntil)}</span>`;

  const grpLabel = m.group ? `組別 ${m.group}` : STAGE[m.stage];
  const stageTag = m.group ? STAGE[m.stage] : '';
  const cardClass = [m.stage, isLive?'live':'', st==='done'?'done':''].filter(Boolean).join(' ');

  return `<div class="card ${cardClass}">
    <div class="card-top">
      <span class="grp-label">${grpLabel}</span>
      ${stageTag ? `<span class="stage-tag">${stageTag}</span>` : ''}
      ${badge}
    </div>
    <div class="teams">
      <div class="team"><div class="flag">${flag(m.home)}</div><div class="tname">${m.home}</div></div>
      <div class="scorebox">${scoreHTML}</div>
      <div class="team"><div class="flag">${flag(m.away)}</div><div class="tname">${m.away}</div></div>
    </div>
    <div class="card-bot">
      <span class="match-time ${isLive?'live':''}">${twStr(m.dateObj)}</span>
      <span style="opacity:.5">📍</span>
      <span>${m.venue}</span>
    </div>
  </div>`;
}

function updateStats() {
  const now = new Date();
  const today = nowDayKey();
  const done = MATCHES.filter(m => status(m) === 'done').length;
  const todayCnt = MATCHES.filter(m => twDayKey(m.dateObj) === today).length;
  const next = MATCHES.filter(m => m.dateObj > now).sort((a,b) => a.dateObj-b.dateObj)[0];
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-today').textContent = todayCnt;
  if (next) {
    const ms = next.dateObj - now;
    const h = Math.floor(ms/3600000), mi = Math.floor((ms%3600000)/60000);
    document.getElementById('s-next').textContent = h > 24 ? Math.floor(h/24)+'天' : h > 0 ? h+'h' : mi+'分';
  }
}

function updateClock() {
  const tw = new Date(Date.now() + 8*3600000);
  const t = [tw.getUTCHours(), tw.getUTCMinutes(), tw.getUTCSeconds()]
    .map(n => String(n).padStart(2,'0')).join(':');
  document.getElementById('clock').textContent = t;
}

// ── EVENTS ───────────────────────────────────────────
document.querySelectorAll('.fbtn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    filterStage = b.dataset.f;
    render();
  });
});
document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  render();
});

// ── INIT ─────────────────────────────────────────────
render();
updateStats();
updateClock();
setInterval(updateClock, 1000);
setInterval(() => { render(); updateStats(); }, 60000);
fetchESPN();
setInterval(fetchESPN, 60000);

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
