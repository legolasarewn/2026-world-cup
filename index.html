<html lang="zh-TW">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2026 世界杯賽程</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --navy: #0a1628;
  --navy2: #0f1f3d;
  --gold: #c9a227;
  --gold2: #e8c04a;
  --red: #c0392b;
  --green: #27ae60;
  --gray: #7a8fa8;
  --card: #0e1929;
  --border: #1a2d4a;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--navy); color:#dde5f0; font-family:'Noto Sans TC',sans-serif; min-height:100vh; }

/* HEADER */
.header {
  background: linear-gradient(170deg, #071020 0%, #0d1e3a 50%, #0a1628 100%);
  padding: 24px 16px 16px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 2px 8px;
  border-radius: 2px;
  margin-bottom: 8px;
  opacity: 0.85;
}
.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 4px;
  color: #fff;
  line-height: 1;
}
.title span { color: var(--gold); }
.subtitle { font-size: 11px; color: var(--gray); margin-top: 5px; letter-spacing: 0.5px; }
.hosts { font-size: 20px; margin-top: 10px; display: flex; justify-content: center; gap: 10px; align-items: center; }
.hosts span { font-size: 11px; color: var(--border); }

/* LIVE BAR */
.livebar {
  background: var(--navy2);
  padding: 8px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.api-dot { font-size: 10px; color: var(--gray); transition: color .3s; }
.api-dot.ok { color: var(--green); }
.api-dot.err { color: var(--gold); }
.clock { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--gold); letter-spacing: 2px; }

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat {
  background: var(--navy2);
  padding: 10px 4px;
  text-align: center;
}
.stat-n { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--gold); line-height:1; }
.stat-l { font-size:9px; color:var(--gray); margin-top:2px; letter-spacing:0.5px; }

/* FILTERS */
.filters {
  display: flex;
  gap: 6px;
  padding: 10px 14px;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--navy);
  border-bottom: 1px solid var(--border);
}
.filters::-webkit-scrollbar { display: none; }
.fbtn {
  flex-shrink: 0;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--gray);
  padding: 5px 13px;
  border-radius: 20px;
  font-size: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.fbtn.on { background: var(--gold); color: var(--navy); border-color: var(--gold); font-weight: 700; }

/* SEARCH */
.search { padding: 10px 14px; background: var(--navy); border-bottom: 1px solid var(--border); }
.search input {
  width: 100%;
  background: var(--navy2);
  border: 1px solid var(--border);
  color: #dde5f0;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
}
.search input:focus { border-color: var(--gold); }
.search input::placeholder { color: var(--gray); }

/* DAY */
.day { padding: 0 14px; }
.day-hdr {
  display: flex;
  align-items: baseline;
  gap: 6px;
  padding: 14px 0 6px;
  position: sticky;
  top: 0;
  background: var(--navy);
  z-index: 5;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.day-date { font-size: 15px; font-weight: 700; color: #fff; }
.day-wd { font-size: 11px; color: var(--gray); }
.day-cnt { margin-left: auto; font-size: 10px; color: var(--gray); background: var(--navy2); padding: 2px 7px; border-radius: 10px; }

/* MATCH CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 13px;
  margin-bottom: 7px;
  position: relative;
}
.card.live { border-color: var(--red); }
.card.done { opacity: .6; }
.card.r32,.card.r16 { border-left: 3px solid #6366f1; }
.card.qf { border-left: 3px solid #0891b2; }
.card.sf { border-left: 3px solid var(--red); }
.card.final { border-left: 3px solid var(--gold); background: linear-gradient(135deg,var(--card),#150f00); }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 9px;
}
.grp-label { font-size: 10px; color: var(--gold); font-weight: 700; letter-spacing: 1px; }
.stage-tag { font-size: 10px; color: var(--gray); background: var(--navy2); padding: 1px 6px; border-radius: 3px; }
.live-badge {
  font-size: 9px; font-weight: 700; color: #fff; background: var(--red);
  padding: 2px 6px; border-radius: 3px; letter-spacing: 1px;
  animation: blink 1.4s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.countdown-badge { font-size: 10px; color: var(--gold); font-weight: 600; }

.teams {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}
.team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.flag { font-size: 28px; line-height: 1; }
.tname { font-size: 11px; font-weight: 700; color: #fff; text-align: center; line-height: 1.2; }
.scorebox { min-width: 60px; text-align: center; }
.score { font-family:'Bebas Neue',sans-serif; font-size:30px; line-height:1; color:var(--gold2); letter-spacing:2px; }
.vs { font-size: 13px; color: var(--gray); }
.live-score { font-size: 13px; color: var(--red); font-weight: 700; }

.card-bot { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--gray); }
.match-time { font-weight: 700; color: #9ab0cc; font-size: 13px; }
.match-time.live { color: var(--red); }
.card.expandable { cursor: pointer; }
.expand-hint { margin-left: auto; font-size: 10px; color: var(--gold); }
.goals-detail {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  padding: 8px 10px;
  background: var(--navy2);
  border-radius: 6px;
  border: 1px solid var(--border);
}
.goals-col { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.goal-line { font-size: 11px; color: #c8d4e6; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.goal-line.no-goal { color: var(--gray); justify-content: center; }
.goal-min { color: var(--gold); font-weight: 700; font-size: 10px; }
.pen-tag {
  font-size: 8px; font-weight: 700; color: var(--navy);
  background: var(--gold); padding: 0px 4px; border-radius: 3px;
}

/* EMPTY */
.empty { text-align: center; padding: 60px 20px; color: var(--gray); }
.empty .ico { font-size: 40px; margin-bottom: 12px; }

/* FOOTER */
.footer { text-align:center; padding:24px 16px; font-size:10px; color:var(--gray); border-top:1px solid var(--border); margin-top:20px; }
.footer a { color:var(--gold); text-decoration:none; }

/* MAIN TABS */
.main-tabs {
  display: flex;
  background: var(--navy2);
  border-bottom: 2px solid var(--border);
}
.mtab {
  flex: 1;
  padding: 12px;
  background: transparent;
  border: none;
  color: var(--gray);
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all .2s;
}
.mtab.on { color: var(--gold); border-bottom-color: var(--gold); font-weight: 700; }

/* STANDINGS */
.standings-wrap { padding: 12px 14px; }
.group-block {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
}
.group-title {
  background: var(--navy2);
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 1.5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.group-teams { list-style: none; }
.team-row {
  display: grid;
  grid-template-columns: 20px 28px 1fr 28px 28px 28px 28px 40px;
  align-items: center;
  gap: 4px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.team-row:last-child { border-bottom: none; }
.team-row.qualify { background: rgba(39,174,96,0.06); }
.team-row.header {
  font-size: 9px;
  color: var(--gray);
  padding: 5px 12px;
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.5px;
}
.tr-pos { color: var(--gray); font-size: 11px; text-align: center; }
.tr-flag { font-size: 18px; }
.tr-name { font-weight: 600; color: #fff; font-size: 12px; }
.tr-num { text-align: center; color: #b0c0d8; }
.tr-pts { text-align: center; font-weight: 700; color: var(--gold); font-size: 14px; font-family: 'Bebas Neue', sans-serif; }
.tr-gd { text-align: center; font-size: 11px; }
.tr-gd.pos { color: var(--green); }
.tr-gd.neg { color: var(--red); }
.qualify-line {
  font-size: 9px;
  color: var(--green);
  padding: 3px 12px;
  background: rgba(39,174,96,0.08);
  border-top: 1px dashed rgba(39,174,96,0.3);
}
.team-row.qualify-third { background: rgba(201,162,39,0.07); }
</style>
</head>

// Parse TW time string → UTC Date
function parseTW(s) {
  const [d, t] = s.split(' ');
  const [y,mo,day] = d.split('-').map(Number);
  const [h,mi] = t.split(':').map(Number);
  return new Date(Date.UTC(y, mo-1, day, h-8, mi));
}

// 解析 openfootball 的佔位文字（如 "3A/B/C/D/F"、"W74"）成我們的代碼格式
function parseOfbPlaceholder(s) {
  if (!s) return null;
  // "1I" → "I1" (winner), "2I" → "I2" (runner-up), "3A/B/C/D/F" → "3ABCDF"
  let m = s.match(/^([123])([A-L])$/);
  if (m) return m[2] + m[1];
  m = s.match(/^3([A-L\/]+)$/);
  if (m) return '3' + m[1].replace(/\//g,'');
  m = s.match(/^W(\d+)$/);
  if (m) return s;
  m = s.match(/^L(\d+)$/);
  if (m) return s;
  return null;
}

async function fetchESPN() {
  if (Date.now() - lastFetch < 55000) return;
  lastFetch = Date.now();
  try {
    const url = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const now = new Date();
    const ofbMatches = data.matches || [];

    ofbMatches.forEach(m => {
      const ft = m.score?.ft;
      if (!ft || ft.length < 2) return;
      const home = OFB[m.team1] || m.team1;
      const away = OFB[m.team2] || m.team2;
      const matchDate = new Date(m.date + 'T00:00:00Z');
      const st = matchDate < now ? 'done' : 'pre';
      const et = m.score?.et;
      const pen = m.score?.p;
      liveData[home+'|'+away] = {
        sh: ft[0], sa: ft[1], st,
        et: et || null,
        pen: pen || null,
        goals1: m.goals1 || [],
        goals2: m.goals2 || []
      };
    });

    resolveKnockoutNames(ofbMatches);
    apiOk = true;
  } catch(e) {
    apiOk = false;
  }
  updateApiDot();
  render();
}

// 將我們 RAW 裡的代碼（如 'A2','3ABCDF','W74'）對應到 openfootball 已解析出的真實隊伍名稱。
// 比對方式：同一輪次的比賽，依照「日期」排序後位置一一對應（兩邊都遵循 FIFA 官方賽程順序）。
function resolveKnockoutNames(ofbMatches) {
  // ── 先用我們自己的積分榜計算「冠軍/亞軍」代碼（如 I1, I2），
  //    不用等 openfootball 更新 32 強對戰表，只要該組賽程全部結束就能算出 ──
  const stats = calcStandings();
  Object.entries(GROUP_TEAMS).forEach(([grp, teams]) => {
    const groupMatches = MATCHES.filter(mm => mm.stage === 'group' && mm.group === grp);
    const allDone = groupMatches.every(mm => isMatchDone(mm));
    if (!allDone) return; // 該組還沒比完，先不算
    const sorted = sortTeams(teams, stats);
    resolvedTeams[grp+'1'] = sorted[0]; // 冠軍
    resolvedTeams[grp+'2'] = sorted[1]; // 亞軍
    // 第三名先記錄，供「最佳第三」邏輯使用（如果之後要自己算最佳第三可以延伸）
    resolvedTeams[grp+'3'] = sorted[2];
  });

  // openfootball 的資料順序就是 FIFA 官方比賽編號順序（已驗證），
  // 所以用陣列索引直接對應比賽編號最可靠，不需要用日期排序去猜測。
  const r32 = ofbMatches.filter(m => /Round of 32/.test(m.round||''));   // 第73-88場
  const r16 = ofbMatches.filter(m => /Round of 16/.test(m.round||''));  // 第89-96場
  const qf  = ofbMatches.filter(m => /Quarter/.test(m.round||''));      // 第97-100場
  const sf  = ofbMatches.filter(m => /Semi/.test(m.round||''));         // 第101-102場
  const third = ofbMatches.find(m => /Third/.test(m.round||''));        // 第103場
  const final = ofbMatches.find(m => m.round === 'Final');              // 第104場

  // 判斷勝者：優先看 PK (p)，其次加時賽 (et)，最後全場 (ft)
  const winner = (score) => {
    if (!score) return 0;
    const s = score.p || score.et || score.ft;
    if (!s || s.length < 2) return 0;
    return s[0] > s[1] ? 1 : s[1] > s[0] ? 2 : 0;
  };

  // 我們 RAW 裡 32強的順序，對應 FIFA 第73~88場
  const ourR32 = MATCHES.filter(mm => mm.stage === 'r32');
  r32.forEach((ofbM, i) => {
    const ourM = ourR32[i];
    if (!ourM) return;
    const matchNum = 73 + i;
    const n1 = OFB[ofbM.team1] || ofbM.team1;
    const n2 = OFB[ofbM.team2] || ofbM.team2;
    // 只在我們 RAW 該位置還是代碼（未知隊伍）時才寫入，避免覆蓋已確定的真實隊名
    if (!parseOfbPlaceholder(ofbM.team1) && !ZH[ourM.home]) resolvedTeams[ourM.home] = n1;
    if (!parseOfbPlaceholder(ofbM.team2) && !ZH[ourM.away]) resolvedTeams[ourM.away] = n2;
    const w = winner(ofbM.score);
    if (w === 1) { resolvedTeams['W'+matchNum] = n1; resolvedTeams['L'+matchNum] = n2; }
    else if (w === 2) { resolvedTeams['W'+matchNum] = n2; resolvedTeams['L'+matchNum] = n1; }
  });

  const ourR16 = MATCHES.filter(mm => mm.stage === 'r16');
  r16.forEach((ofbM, i) => {
    const ourM = ourR16[i];
    if (!ourM) return;
    const matchNum = 89 + i;
    const n1 = OFB[ofbM.team1] || ofbM.team1;
    const n2 = OFB[ofbM.team2] || ofbM.team2;
    if (!/^[WL]\d+$/.test(ofbM.team1||'')) resolvedTeams[ourM.home] = n1;
    if (!/^[WL]\d+$/.test(ofbM.team2||'')) resolvedTeams[ourM.away] = n2;
    const w = winner(ofbM.score);
    if (w === 1) { resolvedTeams['W'+matchNum] = n1; resolvedTeams['L'+matchNum] = n2; }
    else if (w === 2) { resolvedTeams['W'+matchNum] = n2; resolvedTeams['L'+matchNum] = n1; }
  });

  const ourQf = MATCHES.filter(mm => mm.stage === 'qf');
  qf.forEach((ofbM, i) => {
    const ourM = ourQf[i];
    if (!ourM) return;
    const matchNum = 97 + i;
    const n1 = OFB[ofbM.team1] || ofbM.team1;
    const n2 = OFB[ofbM.team2] || ofbM.team2;
    if (!/^[WL]\d+$/.test(ofbM.team1||'')) resolvedTeams[ourM.home] = n1;
    if (!/^[WL]\d+$/.test(ofbM.team2||'')) resolvedTeams[ourM.away] = n2;
    const w = winner(ofbM.score);
    if (w === 1) { resolvedTeams['W'+matchNum] = n1; resolvedTeams['L'+matchNum] = n2; }
    else if (w === 2) { resolvedTeams['W'+matchNum] = n2; resolvedTeams['L'+matchNum] = n1; }
  });

  const ourSf = MATCHES.filter(mm => mm.stage === 'sf' && mm.tw < '2026-07-18');
  sf.forEach((ofbM, i) => {
    const ourM = ourSf[i];
    if (!ourM) return;
    const matchNum = 101 + i;
    const n1 = OFB[ofbM.team1] || ofbM.team1;
    const n2 = OFB[ofbM.team2] || ofbM.team2;
    if (!/^[WL]\d+$/.test(ofbM.team1||'')) resolvedTeams[ourM.home] = n1;
    if (!/^[WL]\d+$/.test(ofbM.team2||'')) resolvedTeams[ourM.away] = n2;
    const w = winner(ofbM.score);
    if (w === 1) { resolvedTeams['W'+matchNum] = n1; resolvedTeams['L'+matchNum] = n2; }
    else if (w === 2) { resolvedTeams['W'+matchNum] = n2; resolvedTeams['L'+matchNum] = n1; }
  });

  // 季軍賽（兩位四強敗者）
  const ourThird = MATCHES.find(mm => mm.stage === 'sf' && mm.tw >= '2026-07-18');
  if (third && ourThird) {
    const n1 = OFB[third.team1] || third.team1;
    const n2 = OFB[third.team2] || third.team2;
    if (!/^[WL]\d+$/.test(third.team1||'')) resolvedTeams[ourThird.home] = n1;
    if (!/^[WL]\d+$/.test(third.team2||'')) resolvedTeams[ourThird.away] = n2;
  }

  // 決賽
  const ourFinal = MATCHES.find(mm => mm.stage === 'final');
  if (final && ourFinal) {
    const n1 = OFB[final.team1] || final.team1;
    const n2 = OFB[final.team2] || final.team2;
    if (!/^[WL]\d+$/.test(final.team1||'')) resolvedTeams[ourFinal.home] = n1;
    if (!/^[WL]\d+$/.test(final.team2||'')) resolvedTeams[ourFinal.away] = n2;
  }
}

function twStr(date) {
  const tw = new Date(date.getTime() + 8*3600000);
  return String(tw.getUTCHours()).padStart(2,'0')+':'+String(tw.getUTCMinutes()).padStart(2,'0');
}
function twDayKey(date) {
  const tw = new Date(date.getTime() + 8*3600000);
  return `${tw.getUTCFullYear()}-${String(tw.getUTCMonth()+1).padStart(2,'0')}-${String(tw.getUTCDate()).padStart(2,'0')}`;
}
function twDayLabel(date) {
  const tw = new Date(date.getTime() + 8*3600000);
  const wd = ['日','一','二','三','四','五','六'][tw.getUTCDay()];
  return `${tw.getUTCMonth()+1}月${tw.getUTCDate()}日（週${wd}）`;
}
function nowDayKey() { return twDayKey(new Date()); }
function status(m) {
  const now = Date.now(), s = m.dateObj.getTime();
  if (now < s) return 'pre';
  if (now < s + 130*60000) return 'live';
  return 'done';
}
function countdown(ms) {
  const h = Math.floor(ms/3600000), mi = Math.floor((ms%3600000)/60000);
  if (h > 48) return Math.floor(h/24)+'天後';
  if (h > 0) return h+'h'+mi+'m 後開賽';
  return mi+'分鐘後開賽';
}

    if (filterStage !== 'all' && m.stage !== filterStage) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      const homeMatch = m.home.toLowerCase().includes(q) || (ZH[m.home]||'').includes(q);
      const awayMatch = m.away.toLowerCase().includes(q) || (ZH[m.away]||'').includes(q);
      if (!homeMatch && !awayMatch && !m.venue.includes(q)) return false;
    }
    return true;
  });
}

// ── RENDER ───────────────────────────────────────────
function isMatchDone(m) {
  const live = getLive(m.home, m.away);
  const hasScore = live ? true : m.scoreHome !== undefined;
  return live ? live.st === 'done' : (hasScore && status(m) !== 'pre');
}

function render() {
  const list = filtered();
  const byDay = {};
  list.forEach(m => {
    const k = twDayKey(m.dateObj);
    (byDay[k] = byDay[k]||[]).push(m);
  });
  const el = document.getElementById('list');
  const dayKeys = Object.keys(byDay);
  if (!dayKeys.length) {
    el.innerHTML = '<div class="empty"><div class="ico">🔍</div>找不到相關比賽</div>';
    return;
  }
  const today = nowDayKey();

  // Build day "blocks" — today may split into two blocks (not-done / done)
  const blocks = []; // { key, dayKey, matches, group: 0=today-active,1=today-done,2=future,3=past-done }
  dayKeys.forEach(dk => {
    const ms = byDay[dk];
    if (dk === today) {
      const active = ms.filter(m => !isMatchDone(m));
      const done = ms.filter(m => isMatchDone(m));
      if (active.length) blocks.push({ dayKey: dk, matches: active, group: 0 });
      if (done.length) blocks.push({ dayKey: dk, matches: done, group: 1 });
    } else if (dk > today) {
      blocks.push({ dayKey: dk, matches: ms, group: 2 });
    } else {
      blocks.push({ dayKey: dk, matches: ms, group: 3 });
    }
  });

  // Sort blocks: group asc, then within group 2 (future) ascending date, group 3 (past) descending date (most recent past first)
  blocks.sort((a, b) => {
    if (a.group !== b.group) return a.group - b.group;
    if (a.group === 3) return b.dayKey.localeCompare(a.dayKey); // past: most recent first
    return a.dayKey.localeCompare(b.dayKey); // today/future: ascending
  });

  el.innerHTML = blocks.map(blk => {
    const ms = blk.matches;
    const sorted = [...ms].sort((a, b) => {
      const doneA = isMatchDone(a), doneB = isMatchDone(b);
      if (doneA !== doneB) return doneA ? 1 : -1;
      return a.dateObj - b.dateObj;
    });
    const isToday = blk.dayKey === today;
    const label = twDayLabel(sorted[0].dateObj);
    const doneTag = blk.group === 1 ? ' <span style="font-size:10px;color:var(--gray);font-weight:400">（已完成）</span>' : '';
    const cards = sorted.map(m => matchCard(m)).join('');
    return `<div class="day">
      <div class="day-hdr">
        <span class="day-date">${label} ${isToday ? '🔴' : ''}${doneTag}</span>
        <span class="day-cnt">${ms.length} 場</span>
      </div>${cards}</div>`;
  }).join('');
}

function matchCard(m) {
  const now = Date.now();
  const st = status(m);
  const live = getLive(m.home, m.away);
  const done = isMatchDone(m);

  // Score display
  const hasScore = live ? true : m.scoreHome !== undefined;
  const sh = live ? live.sh : m.scoreHome;
  const sa = live ? live.sa : m.scoreAway;

  // Live = time says in-progress AND not already marked done by score data
  const isLive = !done && st === 'live';

  let scoreHTML;
  if (hasScore) {
    let extra = '';
    if (live?.pen) extra = `<div style="font-size:10px;color:var(--gold);text-align:center">(PK ${live.pen[0]}:${live.pen[1]})</div>`;
    else if (live?.et) extra = `<div style="font-size:10px;color:var(--gray);text-align:center">AET</div>`;
    scoreHTML = `<div class="score">${sh}:${sa}</div>${extra}`;
  }
  else if (isLive) scoreHTML = `<div class="live-score">直播中</div>`;
  else scoreHTML = `<div class="vs">VS</div>`;

  const msUntil = m.dateObj.getTime() - now;
  let badge = '';
  if (isLive) badge = `<span class="live-badge">● LIVE</span>`;
  else if (st === 'pre' && msUntil < 86400000) badge = `<span class="countdown-badge">${countdown(msUntil)}</span>`;

  const grpLabel = m.group ? `組別 ${m.group}` : STAGE[m.stage];
  const stageTag = m.group ? STAGE[m.stage] : '';

  // Goals data (only available via live/openfootball data)
  const goals1 = live?.goals1 || [];
  const goals2 = live?.goals2 || [];
  const hasGoalsData = hasScore && (goals1.length > 0 || goals2.length > 0);
  const cardId = 'card_' + m.home.replace(/\W/g,'') + '_' + m.away.replace(/\W/g,'') + '_' + m.tw.replace(/\W/g,'');

  const cardClass = [m.stage, isLive?'live':'', done?'done':'', hasGoalsData?'expandable':''].filter(Boolean).join(' ');

  const goalLine = (g) => {
    const pen = g.penalty ? ' <span class="pen-tag">P</span>' : '';
    return `<div class="goal-line">⚽ ${g.name} <span class="goal-min">${g.minute}'</span>${pen}</div>`;
  };

  const goalsHTML = hasGoalsData ? `
    <div class="goals-detail" id="${cardId}" style="display:none">
      <div class="goals-col">
        ${goals1.length ? goals1.map(goalLine).join('') : '<div class="goal-line no-goal">—</div>'}
      </div>
      <div class="goals-col">
        ${goals2.length ? goals2.map(goalLine).join('') : '<div class="goal-line no-goal">—</div>'}
      </div>
    </div>` : '';

  const clickAttr = hasGoalsData ? `onclick="toggleGoals('${cardId}')"` : '';
  const expandHint = hasGoalsData ? `<span class="expand-hint" id="${cardId}_hint">▾ 進球詳情</span>` : '';

  return `<div class="card ${cardClass}" ${clickAttr}>
    <div class="card-top">
      <span class="grp-label">${grpLabel}</span>
      ${stageTag ? `<span class="stage-tag">${stageTag}</span>` : ''}
      ${badge}
    </div>
    <div class="teams">
      <div class="team"><div class="flag">${flag(m.home)}</div><div class="tname">${zh(m.home)}</div></div>
      <div class="scorebox">${scoreHTML}</div>
      <div class="team"><div class="flag">${flag(m.away)}</div><div class="tname">${zh(m.away)}</div></div>
    </div>
    ${goalsHTML}
    <div class="card-bot">
      <span class="match-time ${isLive?'live':''}">${twStr(m.dateObj)}</span>
      <span style="opacity:.5">📍</span>
      <span>${m.venue}</span>
      ${expandHint}
    </div>
  </div>`;
}

function toggleGoals(id) {
  const el = document.getElementById(id);
  const hint = document.getElementById(id + '_hint');
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'flex';
  if (hint) hint.textContent = isOpen ? '▾ 進球詳情' : '▴ 收合';
}

function updateStats() {
  const now = new Date();
  const today = nowDayKey();
  const done = MATCHES.filter(m => status(m) === 'done').length;
  const todayCnt = MATCHES.filter(m => twDayKey(m.dateObj) === today).length;
  const next = MATCHES.filter(m => m.dateObj > now).sort((a,b) => a.dateObj-b.dateObj)[0];
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-today').textContent = todayCnt;
  if (next) {
    const ms = next.dateObj - now;
    const h = Math.floor(ms/3600000), mi = Math.floor((ms%3600000)/60000);
    document.getElementById('s-next').textContent = h > 24 ? Math.floor(h/24)+'天' : h > 0 ? h+'h' : mi+'分';
  }
}

function updateClock() {
  const tw = new Date(Date.now() + 8*3600000);
  const t = [tw.getUTCHours(), tw.getUTCMinutes(), tw.getUTCSeconds()]
    .map(n => String(n).padStart(2,'0')).join(':');
  document.getElementById('clock').textContent = t;
}

// ── EVENTS ───────────────────────────────────────────
document.querySelectorAll('.fbtn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    filterStage = b.dataset.f;
    render();
  });
});
document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  render();
});

// ── STANDINGS ────────────────────────────────────────
const GROUP_TEAMS = {
  A:['Mexico','South Africa','Korea Republic','Czechia'],
  B:['Canada','Bosnia & Herzegovina','Qatar','Switzerland'],
  C:['Brazil','Morocco','Haiti','Scotland'],
  D:['USA','Paraguay','Australia','Türkiye'],
  E:['Germany','Curaçao','Ivory Coast','Ecuador'],
  F:['Netherlands','Japan','Sweden','Tunisia'],
  G:['Belgium','Egypt','Iran','New Zealand'],
  H:['Spain','Cape Verde','Saudi Arabia','Uruguay'],
  I:['France','Senegal','Iraq','Norway'],
  J:['Argentina','Algeria','Austria','Jordan'],
  K:['Portugal','DR Congo','Uzbekistan','Colombia'],
  L:['England','Croatia','Ghana','Panama'],
};

function calcStandings() {
  // Init stats for each team
  const stats = {};
  Object.values(GROUP_TEAMS).flat().forEach(t => {
    stats[t] = { p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 };
  });

  // Process only finished group matches with scores
  MATCHES.forEach(m => {
    if (m.stage !== 'group') return;
    const live = getLive(m.home, m.away);
    const hasScore = live ? true : m.scoreHome !== undefined;
    if (!hasScore) return;
    const sh = live ? live.sh : m.scoreHome;
    const sa = live ? live.sa : m.scoreAway;
    const h = stats[m.home], a = stats[m.away];
    if (!h || !a) return;
    h.p++; a.p++;
    h.gf += sh; h.ga += sa;
    a.gf += sa; a.ga += sh;
    if (sh > sa) { h.w++; h.pts+=3; a.l++; }
    else if (sh < sa) { a.w++; a.pts+=3; h.l++; }
    else { h.d++; h.pts++; a.d++; a.pts++; }
  });
  return stats;
}

function sortTeams(teams, stats) {
  return [...teams].sort((a,b) => {
    const sa = stats[a], sb = stats[b];
    if (sb.pts !== sa.pts) return sb.pts - sa.pts;
    const gda = sa.gf-sa.ga, gdb = sb.gf-sb.ga;
    if (gdb !== gda) return gdb - gda;
    if (sb.gf !== sa.gf) return sb.gf - sa.gf;
    return a.localeCompare(b);
  });
}

function getBestThirds(stats) {
  // Get the 3rd place team from each group, sort them, top 8 qualify
  const thirds = Object.entries(GROUP_TEAMS).map(([grp, teams]) => {
    const sorted = sortTeams(teams, stats);
    const team = sorted[2];
    return { team, grp, ...stats[team] };
  });
  // Sort thirds by pts → gd → gf
  thirds.sort((a,b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const gda = a.gf-a.ga, gdb = b.gf-b.ga;
    if (gdb !== gda) return gdb - gda;
    if (b.gf !== a.gf) return b.gf - a.gf;
    return a.team.localeCompare(b.team);
  });
  return thirds;
}

function renderStandings() {
  const stats = calcStandings();
  const el = document.getElementById('standingsContent');
  const bestThirds = getBestThirds(stats);
  const top8Thirds = new Set(bestThirds.slice(0,8).map(t => t.team));

  // Group tables
  const groupHtml = Object.entries(GROUP_TEAMS).map(([grp, teams]) => {
    const sorted = sortTeams(teams, stats);

    const rows = sorted.map((team, i) => {
      const s = stats[team];
      const gd = s.gf - s.ga;
      const gdClass = gd > 0 ? 'pos' : gd < 0 ? 'neg' : '';
      // Top 2 = qualify, 3rd in top 8 thirds = also qualify
      const isThirdQual = i === 2 && top8Thirds.has(team);
      const qualClass = i < 2 ? 'qualify' : isThirdQual ? 'qualify-third' : '';
      const posIcon = i < 2 ? '🟢' : isThirdQual ? '🟡' : '';
      return `<li class="team-row ${qualClass}">
        <span class="tr-pos">${posIcon || (i+1)}</span>
        <span class="tr-flag">${flag(team)}</span>
        <span class="tr-name">${zh(team)}</span>
        <span class="tr-num">${s.p}</span>
        <span class="tr-num">${s.w}</span>
        <span class="tr-num">${s.d}</span>
        <span class="tr-num">${s.l}</span>
        <span class="tr-pts">${s.pts}</span>
      </li>`;
    }).join('');

    const played = MATCHES.filter(m => m.stage==='group' && m.group===grp && (getLive(m.home,m.away) || m.scoreHome!==undefined)).length;
    const total = MATCHES.filter(m => m.stage==='group' && m.group===grp).length;

    return `<div class="group-block">
      <div class="group-title">
        <span>組別 ${grp}</span>
        <span style="font-weight:400;color:var(--gray)">${played}/${total} 場</span>
      </div>
      <li class="team-row header">
        <span></span><span></span>
        <span>隊伍</span>
        <span>賽</span><span>勝</span><span>平</span><span>負</span>
        <span>積分</span>
      </li>
      <ul class="group-teams">${rows}</ul>
      <div class="qualify-line">🟢 前兩名晉級 &nbsp;🟡 最佳第三名（暫定）</div>
    </div>`;
  }).join('');

  // Best thirds table
  const thirdsHtml = `<div class="group-block" style="margin-top:16px">
    <div class="group-title">
      <span>🟡 最佳第三名排行</span>
      <span style="font-weight:400;color:var(--gray)">前 8 名晉級</span>
    </div>
    <li class="team-row header">
      <span></span><span></span>
      <span>隊伍（組別）</span>
      <span>賽</span><span>勝</span><span>平</span><span>負</span>
      <span>積分</span>
    </li>
    <ul class="group-teams">
    ${bestThirds.map((t, i) => {
      const gd = t.gf - t.ga;
      const qualClass = i < 8 ? 'qualify-third' : '';
      const sep = i === 7 ? '<li style="border-top:2px dashed var(--red);margin:0;padding:2px 12px;font-size:9px;color:var(--red)">── 晉級線 ──</li>' : '';
      return `${sep}<li class="team-row ${qualClass}">
        <span class="tr-pos" style="color:${i<8?'#e8c04a':'var(--gray)'}">${i+1}</span>
        <span class="tr-flag">${flag(t.team)}</span>
        <span class="tr-name">${t.team} <span style="font-size:9px;color:var(--gray)">(${t.grp}組)</span></span>
        <span class="tr-num">${t.p}</span>
        <span class="tr-num">${t.w}</span>
        <span class="tr-num">${t.d}</span>
        <span class="tr-num">${t.l}</span>
        <span class="tr-pts">${t.pts}</span>
      </li>`;
    }).join('')}
    </ul>
  </div>`;

  el.innerHTML = groupHtml + thirdsHtml;
}

// ── TAB SWITCHING ─────────────────────────────────────
document.querySelectorAll('.mtab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mtab').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    const tab = btn.dataset.tab;
    document.getElementById('view-schedule').style.display = tab === 'schedule' ? '' : 'none';
    document.getElementById('view-standings').style.display = tab === 'standings' ? '' : 'none';
    if (tab === 'standings') renderStandings();
  });
});

render();
updateStats();
updateClock();
setInterval(updateClock, 1000);
setInterval(() => { render(); updateStats(); }, 60000);
fetchESPN();
setInterval(fetchESPN, 60000);
