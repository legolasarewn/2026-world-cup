<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>2026 世界杯賽程</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192-1.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Bebas+Neue&display=swap');

  :root {
    --navy: #0a1628;
    --navy2: #0f1f3d;
    --gold: #c9a227;
    --gold-light: #e8c04a;
    --red: #c0392b;
    --green: #27ae60;
    --gray: #8a9bb0;
    --card: #111d33;
    --border: #1e3052;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    color: #e8edf5;
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  .hero {
    background: linear-gradient(160deg, #0a1628 0%, #0f2040 60%, #1a0a2e 100%);
    padding: 28px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
  }
  .hero::before {
    content: '⚽';
    position: absolute;
    font-size: 180px;
    opacity: 0.04;
    top: -20px;
    right: -30px;
  }
  .tournament-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 8px;
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 3px;
    color: #fff;
    line-height: 1;
  }
  .hero h1 span { color: var(--gold); }
  .hero-sub {
    font-size: 12px;
    color: var(--gray);
    margin-top: 6px;
    letter-spacing: 1px;
  }
  .host-flags {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 22px;
  }

  /* Live clock */
  .live-bar {
    background: var(--navy2);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .clock { color: var(--gold); font-weight: 700; font-size: 14px; }
  .tw-label { color: var(--gray); font-size: 11px; }

  /* Filters */
  .filters {
    padding: 14px 16px;
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--gray);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
  }
  .filter-btn.active {
    background: var(--gold);
    color: var(--navy);
    border-color: var(--gold);
    font-weight: 700;
  }

  /* Search */
  .search-bar {
    padding: 12px 16px;
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
  }
  .search-bar input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: #e8edf5;
    padding: 9px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
  }
  .search-bar input::placeholder { color: var(--gray); }

  /* Day section */
  .day-section {
    padding: 0 16px;
    margin-bottom: 4px;
  }
  .day-header {
    padding: 16px 0 8px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    position: sticky;
    top: 0;
    background: var(--navy);
    z-index: 10;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .day-date {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
  }
  .day-weekday {
    font-size: 11px;
    color: var(--gray);
  }
  .day-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--gray);
    background: var(--card);
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* Match card */
  .match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    position: relative;
    transition: border-color .2s;
  }
  .match-card.live { border-color: var(--red); }
  .match-card.upcoming { border-color: var(--border); }
  .match-card.finished { opacity: 0.65; }

  .match-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .match-group {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 1px;
    font-weight: 700;
  }
  .match-stage-tag {
    font-size: 10px;
    color: var(--gray);
    background: var(--navy2);
    padding: 2px 7px;
    border-radius: 4px;
  }
  .live-badge {
    background: var(--red);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 1px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .match-teams {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .team {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .team-flag { font-size: 26px; line-height: 1; }
  .team-name {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    text-align: center;
  }
  .score-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 56px;
  }
  .score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
  }
  .score.has-score { color: var(--gold-light); }
  .vs { font-size: 14px; color: var(--gray); }

  .match-meta {
    display: flex;
    gap: 10px;
    font-size: 11px;
    color: var(--gray);
    align-items: center;
  }
  .match-time {
    font-weight: 700;
    color: #b0c0d8;
    font-size: 13px;
  }
  .match-time.live-time { color: var(--red); }
  .venue-icon { opacity: 0.6; }

  .countdown {
    font-size: 11px;
    color: var(--gold);
    font-weight: 600;
    margin-left: auto;
  }

  /* Stats */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 14px 16px 4px;
    padding: 12px 8px;
    text-align: center;
    gap: 8px;
  }
  .stat-item {}
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label { font-size: 10px; color: var(--gray); margin-top: 2px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--gray);
    font-size: 14px;
  }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px 16px;
    font-size: 11px;
    color: var(--gray);
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }
  .footer a { color: var(--gold); text-decoration: none; }

  /* Groups quick nav */
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 12px 16px;
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
  }
  .group-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 4px;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
  }
  .group-chip:hover { border-color: var(--gold); }
  .group-chip.selected { background: var(--gold); border-color: var(--gold); }
  .group-chip .glabel { font-size: 10px; font-weight: 700; color: var(--gold); }
  .group-chip.selected .glabel { color: var(--navy); }
  .group-chip .gteams { font-size: 9px; color: var(--gray); margin-top: 2px; line-height: 1.3; }
  .group-chip.selected .gteams { color: var(--navy); opacity: 0.7; }

  .section-toggle {
    font-size: 11px;
    color: var(--gold);
    text-align: center;
    padding: 6px;
    cursor: pointer;
  }

  /* Knockout round styling */
  .knockout-card { border-left: 3px solid #7c3aed; }
  .qf-card { border-left: 3px solid #0891b2; }
  .sf-card { border-left: 3px solid #dc2626; }
  .final-card { border-left: 3px solid var(--gold); background: linear-gradient(135deg, var(--card), #1a1000); }
</style>
</head>

  group: '小組賽', r32: '32強', r16: '16強', qf: '八強', sf: '四強', final: '決賽'

// Parse TW datetime string → Date object (TW time is UTC+8)
function parseTW(str) {
  const [datePart, timePart] = str.split(' ');
  const [y,mo,d] = datePart.split('-').map(Number);
  const [h,mi] = timePart.split(':').map(Number);
  // Create as UTC, then subtract 8h to get UTC equivalent
  return new Date(Date.UTC(y, mo-1, d, h-8, mi));
}

function getTWNow() {
  const now = new Date();
  return new Date(now.getTime() + (8*60 - now.getTimezoneOffset()*(-1) )*60000);
}

// Actually just use the UTC time
function getNow() { return new Date(); }

function getMatchStatus(matchDate) {
  const now = getNow();
  const start = matchDate;
  const end = new Date(start.getTime() + 120*60000); // assume 2hr
  if (now < start) return 'upcoming';
  if (now >= start && now < end) return 'live';
  return 'finished';
}

function formatTWTime(date) {
  const utc = date.getTime();
  const tw = new Date(utc + 8*3600000);
  const h = tw.getUTCHours().toString().padStart(2,'0');
  const m = tw.getUTCMinutes().toString().padStart(2,'0');
  return `${h}:${m}`;
}

function formatTWDate(date) {
  const tw = new Date(date.getTime() + 8*3600000);
  const month = tw.getUTCMonth()+1;
  const day = tw.getUTCDate();
  return `${month}月${day}日`;
}

function formatTWDateKey(date) {
  const tw = new Date(date.getTime() + 8*3600000);
  return `${tw.getUTCFullYear()}-${String(tw.getUTCMonth()+1).padStart(2,'0')}-${String(tw.getUTCDate()).padStart(2,'0')}`;
}

function getWeekday(date) {
  const tw = new Date(date.getTime() + 8*3600000);
  const days = ['日','一','二','三','四','五','六'];
  return '（週'+days[tw.getUTCDay()]+'）';
}

function formatCountdown(ms) {
  if (ms <= 0) return '';
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  if (h > 48) {
    const d = Math.floor(h/24);
    return `${d}天後`;
  }
  if (h > 0) return `${h}小時${m}分後開賽`;
  return `${m}分鐘後開賽`;
}

function getFlag(team) {
  return FLAGS[team] || '🏳️';
}

// ESPN API — live scores + standings (no API key needed)
// ============================================================

// Maps ESPN team abbreviations / names → our display names
const ESPN_NAME_MAP = {
  'Mexico':'Mexico','South Africa':'South Africa','Korea Republic':'Korea Republic',
  'South Korea':'Korea Republic','Czechia':'Czechia','Czech Republic':'Czechia',
  'Canada':'Canada','Bosnia-Herzegovina':'Bosnia & Herzegovina','Bosnia and Herzegovina':'Bosnia & Herzegovina',

// Live data store: keyed by "home|away" → { scoreHome, scoreAway, status }
let liveData = {};
let apiLastFetch = 0;
let apiStatus = 'idle'; // idle | loading | ok | error

async function fetchESPN() {
  const now = Date.now();
  if (now - apiLastFetch < 60000) return; // throttle: max once per minute
  apiLastFetch = now;
  apiStatus = 'loading';

  try {
    // ESPN public scoreboard for FIFA World Cup
    const url = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
    const res = await fetch(url);
    if (!res.ok) throw new Error('ESPN API error');
    const data = await res.json();

    const events = data.events || [];
    events.forEach(event => {
      const comp = event.competitions?.[0];
      if (!comp) return;

      const competitors = comp.competitors || [];
      let homeTeam, awayTeam, homeScore, awayScore;

      competitors.forEach(c => {
        const name = ESPN_NAME_MAP[c.team?.displayName] || ESPN_NAME_MAP[c.team?.name] || c.team?.displayName;
        if (c.homeAway === 'home') { homeTeam = name; homeScore = parseInt(c.score) || 0; }
        else { awayTeam = name; awayScore = parseInt(c.score) || 0; }
      });

      if (!homeTeam || !awayTeam) return;

      const statusType = comp.status?.type?.name || '';
      const matchStatus = statusType === 'STATUS_IN_PROGRESS' ? 'live'
        : statusType === 'STATUS_FINAL' ? 'finished' : 'upcoming';

      const key = `${homeTeam}|${awayTeam}`;
      if (matchStatus !== 'upcoming') {
        liveData[key] = { scoreHome: homeScore, scoreAway: awayScore, apiStatus: matchStatus };
      }
    });

    apiStatus = 'ok';
    updateApiIndicator();
    renderAll();
    updateStats();
  } catch(e) {
    apiStatus = 'error';
    updateApiIndicator();
    console.warn('ESPN API fetch failed:', e);
  }
}

function updateApiIndicator() {
  const el = document.getElementById('apiIndicator');
  if (!el) return;
  if (apiStatus === 'ok') { el.textContent = '● 即時資料同步中'; el.style.color = '#27ae60'; }
  else if (apiStatus === 'error') { el.textContent = '● 離線模式（靜態資料）'; el.style.color = '#c9a227'; }
  else if (apiStatus === 'loading') { el.textContent = '⟳ 更新中...'; el.style.color = '#8a9bb0'; }
}

function getLiveScore(home, away) {
  return liveData[`${home}|${away}`] || null;
}

// State
let stageFilter = 'all';
let searchText = '';

function processMatches() {
  return MATCHES.map(match => ({
    ...match,
    dateObj: parseTW(match.tw)
  }));
}

const allMatches = processMatches();

function getFilteredMatches() {
  let filtered = allMatches;
  if (stageFilter !== 'all') {
    filtered = filtered.filter(m => m.stage === stageFilter);
  }
  if (searchText) {
    const q = searchText.toLowerCase();
    filtered = filtered.filter(m =>
      m.home.toLowerCase().includes(q) ||
      m.away.toLowerCase().includes(q) ||
      m.venue.includes(q)
    );
  }
  return filtered;
}

function groupByDay(matches) {
  const days = {};
  matches.forEach(m => {
    const key = formatTWDateKey(m.dateObj);
    if (!days[key]) days[key] = [];
    days[key].push(m);
  });
  return days;
}

function getCardClass(stage) {
  if (stage === 'final') return 'final-card';
  if (stage === 'sf') return 'sf-card';
  if (stage === 'qf') return 'qf-card';
  if (stage === 'r32' || stage === 'r16') return 'knockout-card';
  return '';
}

function renderMatch(match) {
  const now = getNow();
  const status = getMatchStatus(match.dateObj);
  const msUntil = match.dateObj - now;
  const twTime = formatTWTime(match.dateObj);

  // Prefer live API data over static scores
  const live = getLiveScore(match.home, match.away);
  const hasScore = live ? true : match.scoreHome !== undefined;
  const scoreH = live ? live.scoreHome : match.scoreHome;
  const scoreA = live ? live.scoreAway : match.scoreAway;
  const apiMatchStatus = live?.apiStatus || status;

  const homeFlag = getFlag(match.home);
  const awayFlag = getFlag(match.away);

  const scoreDisplay = hasScore
    ? `<span class="score has-score">${scoreH} : ${scoreA}</span>`
    : (apiMatchStatus === 'live' || status === 'live'
      ? `<span class="score live-time">直播中</span>`
      : `<span class="vs">VS</span>`);

  const isLive = apiMatchStatus === 'live' || status === 'live';
  const timeBadge = isLive
    ? `<span class="live-badge">● LIVE</span>`
    : (status === 'upcoming' && msUntil < 24*3600000
      ? `<span class="countdown">${formatCountdown(msUntil)}</span>`
      : '');

  const stageLabel = STAGE_LABELS[match.stage] || match.stage;
  const groupLabel = match.group ? `組別 ${match.group}` : stageLabel;

  return `
  <div class="match-card ${status} ${getCardClass(match.stage)}">
    <div class="match-top">
      <span class="match-group">${groupLabel}</span>
      <span class="match-stage-tag">${match.group ? stageLabel : ''}</span>
      ${timeBadge}
    </div>
    <div class="match-teams">
      <div class="team">
        <div class="team-flag">${homeFlag}</div>
        <div class="team-name">${match.home}</div>
      </div>
      <div class="score-box">
        ${scoreDisplay}
      </div>
      <div class="team">
        <div class="team-flag">${awayFlag}</div>
        <div class="team-name">${match.away}</div>
      </div>
    </div>
    <div class="match-meta">
      <span class="match-time ${status === 'live' ? 'live-time' : ''}">${twTime}</span>
      <span class="venue-icon">📍</span>
      <span>${match.venue}</span>
    </div>
  </div>`;
}

function renderAll() {
  const filtered = getFilteredMatches();
  const byDay = groupByDay(filtered);
  const sortedDays = Object.keys(byDay).sort();
  const container = document.getElementById('matchList');

  if (sortedDays.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="big">🔍</div>找不到相關比賽<br>換個關鍵字試試</div>`;
    return;
  }

  let html = '';
  sortedDays.forEach(dateKey => {
    const dayMatches = byDay[dateKey];
    const dateObj = dayMatches[0].dateObj;
    const twDate = new Date(dateObj.getTime() + 8*3600000);
    const month = twDate.getUTCMonth()+1;
    const day = twDate.getUTCDate();
    const weekday = getWeekday(dateObj);

    // Check if today
    const todayKey = formatTWDateKey(getNow());
    const isToday = dateKey === todayKey;

    html += `<div class="day-section">
      <div class="day-header">
        <span class="day-date">${month}月${day}日 ${isToday ? '🔴 今天' : ''}</span>
        <span class="day-weekday">${weekday}</span>
        <span class="day-count">${dayMatches.length} 場</span>
      </div>`;

    dayMatches.forEach(m => { html += renderMatch(m); });
    html += '</div>';
  });

  container.innerHTML = html;
}

function updateStats() {
  const now = getNow();
  const todayKey = formatTWDateKey(now);

  const done = allMatches.filter(m => getMatchStatus(m.dateObj) === 'finished').length;
  const todayMatches = allMatches.filter(m => formatTWDateKey(m.dateObj) === todayKey);
  const upcoming = allMatches.filter(m => m.dateObj > now).sort((a,b)=>a.dateObj-b.dateObj);

  document.getElementById('s-done').textContent = done;
  document.getElementById('s-today').textContent = todayMatches.length;

  if (upcoming.length > 0) {
    const ms = upcoming[0].dateObj - now;
    const h = Math.floor(ms/3600000);
    const mi = Math.floor((ms%3600000)/60000);
    if (h > 24) {
      document.getElementById('s-next').textContent = Math.floor(h/24)+'天';
    } else if (h > 0) {
      document.getElementById('s-next').textContent = h+'h'+mi+'m';
    } else {
      document.getElementById('s-next').textContent = mi+'分';
    }
  }
}

function updateClock() {
  const now = new Date();
  const tw = new Date(now.getTime() + 8*3600000);
  const h = String(tw.getUTCHours()).padStart(2,'0');
  const m = String(tw.getUTCMinutes()).padStart(2,'0');
  const s = String(tw.getUTCSeconds()).padStart(2,'0');
  document.getElementById('liveClock').textContent = `${h}:${m}:${s}`;
}

// Event listeners
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    stageFilter = btn.dataset.stage;
    renderAll();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchText = e.target.value.trim();
  renderAll();
});

// Init
renderAll();
updateStats();
updateClock();
setInterval(updateClock, 1000);
setInterval(() => { renderAll(); updateStats(); }, 60000);

// Fetch live data immediately and then every 60 seconds
fetchESPN();
setInterval(fetchESPN, 60000);

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
